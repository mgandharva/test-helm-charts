# This Github action will re-release container-storage-modules and specified deleted charts
name: Re-release Container Storage Modules

# Invocable as a manual workflow
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version. E.g. 1.17.0'
        required: true
      deleted_packages:
        description: 'Comma-separated list of deleted chart packages to re-release. E.g. csi-powermax, csi-unity'
        required: false

permissions:
  contents: write

jobs:
  re-release-container-storage-modules:
    runs-on: ubuntu-latest
    steps:
      # Check out code
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.1'

      - name: Install chart-releaser
        run: |
          curl -sSLo cr.tar.gz https://github.com/helm/chart-releaser/releases/download/v1.7.0/chart-releaser_1.7.0_linux_amd64.tar.gz
          tar -xzf cr.tar.gz
          echo "$PWD" >> $GITHUB_PATH
          rm cr.tar.gz

      - name: Delete local release tags
        run: |
          git tag -l | xargs git tag -d || true
          echo "Deleted all local release tags"

      - name: Create/update release branch from main
        run: |
          branch_name=release-v${{ inputs.version }}
          # Fetch origin
          git fetch origin
          # Check if branch exists
          if git ls-remote --heads origin $branch_name | grep $branch_name; then
            echo "Branch $branch_name already exists. Deleting it."
            git push origin --delete $branch_name || true
          fi
          # Create branch from main
          git checkout -b $branch_name
          git push origin $branch_name

      - name: Create package directory
        run: |
          mkdir -p .cr-release-packages

      - name: Auto-detect deleted charts (if not manually specified)
        if: ${{ inputs.deleted_packages == '' }}
        id: detect-deleted
        run: |
          # Get all existing GitHub releases
          releases=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases | jq -r '.[].tag_name')

          # Find charts that have releases but don't exist in charts/ directory
          deleted_charts=""
          for release in $releases; do
            # Extract chart name from release tag (format: chartname-version)
            chart_name=$(echo "$release" | sed 's/-[0-9].*//')
            # Check if chart directory exists
            if [ ! -d "charts/$chart_name" ] && [ -n "$chart_name" ]; then
              echo "Found deleted chart: $chart_name (release: $release)"
              if [ -z "$deleted_charts" ]; then
                deleted_charts="$chart_name"
              else
                deleted_charts="$deleted_charts,$chart_name"
              fi
            fi
          done

          if [ -z "$deleted_charts" ]; then
            echo "No deleted charts detected"
            echo "deleted_charts=" >> $GITHUB_OUTPUT
          else
            echo "Auto-detected deleted charts: $deleted_charts"
            echo "deleted_charts=$deleted_charts" >> $GITHUB_OUTPUT
          fi

      - name: Package deleted charts
        if: ${{ inputs.deleted_packages != '' || steps.detect-deleted.outputs.deleted_charts != '' }}
        run: |
          if [ -n "${{ inputs.deleted_packages }}" ]; then
            PACKAGES="${{ inputs.deleted_packages }}"
          else
            PACKAGES="${{ steps.detect-deleted.outputs.deleted_charts }}"
          fi

          IFS=',' read -ra PACKAGES_ARRAY <<< "$PACKAGES"
          for chart_name in "${PACKAGES_ARRAY[@]}"; do
            chart_name=$(echo "$chart_name" | xargs) # trim whitespace
            echo "Processing chart: $chart_name"
            
            # Find the chart directory
            chart_dir=$(find charts -name "Chart.yaml" -exec grep -l "^name: $chart_name$" {} \; | head -1 | xargs -r dirname)
            
            if [ -n "$chart_dir" ]; then
              echo "Building dependencies for $chart_dir..."
              helm dependency build "$chart_dir" || echo "No dependencies to build"
              echo "Packaging $chart_dir..."
              helm package "$chart_dir" -d .cr-release-packages
            else
              echo "Warning: Chart directory not found for $chart_name"
            fi
          done

      - name: Upload deleted charts to GitHub Releases
        run: |
          # Upload deleted charts first
          cr upload --owner ${{ github.repository_owner }} --git-repo ${{ github.event.repository.name }} --token ${{ secrets.GITHUB_TOKEN }} --package-path .cr-release-packages

      - name: Package container-storage-modules (after deleted charts are released)
        run: |
          # Clean the package directory
          rm -rf .cr-release-packages/*
          
          if [ -d "container-storage-modules" ]; then
            for chart in container-storage-modules/*/; do
              if [ -d "$chart" ]; then
                chart_name=$(basename "$chart")
                echo "Building dependencies for container-storage-modules/$chart_name..."
                helm dependency build "$chart"
                echo "Packaging container-storage-modules/$chart_name..."
                helm package "$chart" -d .cr-release-packages
              fi
            done
          fi

      - name: Upload container-storage-modules to GitHub Releases
        run: |
          # Upload container-storage-modules
          cr upload --owner ${{ github.repository_owner }} --git-repo ${{ github.event.repository.name }} --token ${{ secrets.GITHUB_TOKEN }} --package-path .cr-release-packages
